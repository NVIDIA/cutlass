<svg width="1120" height="560" viewBox="0 0 1120 560" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Conceptual IKET timeline</title>
  <desc id="desc">A conceptual timeline showing producer and consumer warp lanes with IKET ranges, markers, timestamps, and payloads.</desc>
  <defs>
    <style>
      .title { font: 700 26px Arial, sans-serif; fill: #111827; }
      .subtitle { font: 14px Arial, sans-serif; fill: #4b5563; }
      .label { font: 700 15px Arial, sans-serif; fill: #1f2937; }
      .small { font: 13px Arial, sans-serif; fill: #374151; }
      .tiny { font: 12px Arial, sans-serif; fill: #4b5563; }
      .mono { font: 12px "SFMono-Regular", Consolas, "Liberation Mono", monospace; fill: #1f2937; }
      .lane { fill: #f9fafb; stroke: #d1d5db; stroke-width: 1.4; }
      .axis { stroke: #6b7280; stroke-width: 2; }
      .dash { stroke: #9ca3af; stroke-width: 1.3; stroke-dasharray: 5 5; }
      .tma { fill: #dcfce7; stroke: #16a34a; }
      .mma { fill: #ede9fe; stroke: #7c3aed; }
      .wait { fill: #dbeafe; stroke: #2563eb; }
      .epi { fill: #fef3c7; stroke: #d97706; }
      .mark { fill: #ef4444; stroke: #991b1b; stroke-width: 2; }
    </style>
  </defs>

  <rect width="1120" height="560" fill="#ffffff"/>

  <text x="48" y="48" class="title">What IKET can visualize inside a kernel</text>
  <text x="48" y="74" class="subtitle">Conceptual illustration, not a run-iket output format. Actual trace viewing uses Perfetto; script analysis uses JSON.</text>

  <line x1="250" y1="104" x2="1000" y2="104" class="axis"/>
  <polygon points="1000,104 986,97 986,111" fill="#6b7280"/>
  <text x="965" y="130" class="tiny">time</text>

  <text x="48" y="168" class="label">Producer warp</text>
  <text x="48" y="268" class="label">Consumer warp 0</text>
  <text x="48" y="368" class="label">Consumer warp 1</text>

  <rect x="230" y="140" width="790" height="64" rx="8" class="lane"/>
  <rect x="230" y="240" width="790" height="64" rx="8" class="lane"/>
  <rect x="230" y="340" width="790" height="64" rx="8" class="lane"/>

  <line x1="300" y1="132" x2="300" y2="430" class="dash"/>
  <line x1="500" y1="132" x2="500" y2="430" class="dash"/>
  <line x1="700" y1="132" x2="700" y2="430" class="dash"/>
  <line x1="900" y1="132" x2="900" y2="430" class="dash"/>

  <rect x="270" y="154" width="150" height="36" rx="6" class="tma" stroke-width="2"/>
  <text x="304" y="177" class="mono">tma_issue</text>
  <rect x="520" y="154" width="150" height="36" rx="6" class="tma" stroke-width="2"/>
  <text x="554" y="177" class="mono">tma_issue</text>
  <rect x="770" y="154" width="150" height="36" rx="6" class="tma" stroke-width="2"/>
  <text x="804" y="177" class="mono">tma_issue</text>

  <rect x="248" y="254" width="84" height="36" rx="6" class="wait" stroke-width="2"/>
  <text x="268" y="277" class="mono">wait</text>
  <rect x="350" y="254" width="142" height="36" rx="6" class="mma" stroke-width="2"/>
  <text x="388" y="277" class="mono">mma_tile</text>
  <rect x="504" y="254" width="108" height="36" rx="6" class="epi" stroke-width="2"/>
  <text x="529" y="277" class="mono">epilogue</text>
  <rect x="636" y="254" width="142" height="36" rx="6" class="mma" stroke-width="2"/>
  <text x="674" y="277" class="mono">mma_tile</text>
  <rect x="790" y="254" width="108" height="36" rx="6" class="epi" stroke-width="2"/>
  <text x="815" y="277" class="mono">epilogue</text>

  <rect x="324" y="354" width="84" height="36" rx="6" class="wait" stroke-width="2"/>
  <text x="344" y="377" class="mono">wait</text>
  <rect x="430" y="354" width="142" height="36" rx="6" class="mma" stroke-width="2"/>
  <text x="468" y="377" class="mono">mma_tile</text>
  <rect x="584" y="354" width="108" height="36" rx="6" class="epi" stroke-width="2"/>
  <text x="609" y="377" class="mono">epilogue</text>
  <rect x="718" y="354" width="142" height="36" rx="6" class="mma" stroke-width="2"/>
  <text x="756" y="377" class="mono">mma_tile</text>
  <rect x="872" y="354" width="108" height="36" rx="6" class="epi" stroke-width="2"/>
  <text x="897" y="377" class="mono">epilogue</text>

  <circle cx="500" cy="172" r="8" class="mark"/>
  <text x="444" y="132" class="mono">mark("next_tile")</text>
  <path d="M495 139 C492 151, 493 158, 497 165" fill="none" stroke="#991b1b" stroke-width="1.5"/>

  <circle cx="636" cy="272" r="8" class="mark"/>
  <text x="588" y="232" class="mono">mark("wait_done")</text>
  <path d="M631 239 C628 251, 629 258, 633 265" fill="none" stroke="#991b1b" stroke-width="1.5"/>

  <text x="270" y="220" class="tiny">Range start/end events record timestamps at IKET call sites.</text>
  <text x="770" y="220" class="tiny">Payload example: k_tile = 3</text>

  <rect x="48" y="452" width="1024" height="70" rx="10" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.4"/>
  <rect x="76" y="474" width="32" height="18" rx="4" class="mma" stroke-width="2"/>
  <text x="118" y="488" class="small">Range: duration reconstructed from paired start/end events</text>
  <circle cx="480" cy="483" r="8" class="mark"/>
  <text x="500" y="488" class="small">Marker: one timestamped point event</text>
  <text x="756" y="488" class="small">Payload: optional runtime value attached to an event</text>

  <text x="48" y="545" class="subtitle">The actual Perfetto trace may contain many kernels, CTAs, warps, and tracks; this diagram only shows the mental model for user-defined IKET instrumentation.</text>
</svg>
